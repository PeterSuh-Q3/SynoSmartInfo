# =============================================================================
# SynoSmartInfo .spk 빌드 워크플로우
#
# 트리거 : main 브랜치 push, PR, 또는 수동 실행
# 결과물 : dist/Synosmartinfo-x.x.x.spk (Actions Artifacts 로 업로드)
#
# 사용하는 Action : tomgrv/synology-package-builder@v1.3.0
# 아키텍처        : noarch (스크립트/Python 전용, 컴파일 없음)
# DSM 타겟        : 7.0
# =============================================================================

name: Build SPK

on:
  push:
    branches: [ main ]
    tags:     [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:   # 수동 실행 허용

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 소스 체크아웃 ────────────────────────────────────────────────────────
      - name: Checkout source
        uses: actions/checkout@v4

      # ── .spk 빌드 ────────────────────────────────────────────────────────────
      - name: Build Synology package
        uses: tomgrv/synology-package-builder@v1.3.0
        with:
          dsm:     "7.2"
          arch:    "noarch"
          projects: ./src
          output:  ./dist

      # ── 빌드 결과물 목록 출력 ────────────────────────────────────────────────
      - name: List generated packages
        run: ls -lh ./dist/*.spk

      # ── Artifacts 업로드 ─────────────────────────────────────────────────────
      - name: Upload SPK artifact
        uses: actions/upload-artifact@v4
        with:
          name: synosmartinfo-spk
          path: ./dist/*.spk
          retention-days: 30

      # ── 태그 푸시 시 GitHub Release 자동 생성 ───────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ./dist/*.spk
          generate_release_notes: true
