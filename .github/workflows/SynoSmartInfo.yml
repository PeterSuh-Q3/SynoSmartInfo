name: Build n Release Synology Smart Info Package
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-spk:
    name: Build Package
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        arch: ['kvmx64']
        dsm: ['7.3','7.2','7.1','7.0']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 1. syno_smart_info.sh 캐시 (하루 단위) ──────────────────
      - name: Cache syno_smart_info.sh
        id: cache_smart_sh
        uses: actions/cache@v4
        with:
          path: ./src/bin/syno_smart_info.sh
          key: syno-smart-info-sh-${{ runner.os }}-${{ hashFiles('**/syno_smart_info.sh') }}-${{ github.run_id }}
          restore-keys: |
            syno-smart-info-sh-${{ runner.os }}-

      - name: Get latest syno_smart_info.sh
        if: steps.cache_smart_sh.outputs.cache-hit != 'true'
        run: |
          curl -kL https://raw.githubusercontent.com/007revad/Synology_SMART_info/refs/heads/main/syno_smart_info.sh \
            -o ./src/bin/syno_smart_info.sh

      # ── 2. Docker 레이어 캐시 ────────────────────────────────────
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: docker-${{ runner.os }}-synology-package-builder-v1.3.0
          restore-keys: |
            docker-${{ runner.os }}-synology-package-builder-

      - name: Pull & cache builder image
        run: |
          docker pull ghcr.io/tomgrv/synology-package-builder:v1.3.0 || true

      # ── 3. 최신 릴리즈 태그 조회 ────────────────────────────────
      - name: Get latest release tag from PeterSuh-Q3/SynoSmartInfo
        id: get_latest_tag
        run: |
          latest_tag=$(curl -s https://api.github.com/repos/PeterSuh-Q3/SynoSmartInfo/releases/latest | jq -r .tag_name)
          echo "Latest tag: $latest_tag"
          major=$(echo $latest_tag | cut -d. -f1 | tr -d 'v')
          minor=$(echo $latest_tag | cut -d. -f2)
          patch=$(echo $latest_tag | cut -d. -f3)
          if [ "$patch" -lt 9 ]; then
            patch=$((patch + 1))
          else
            patch=0
            minor=$((minor + 1))
          fi
          new_tag="v${major}.${minor}.${patch}"
          echo "new_tag=$new_tag" >> $GITHUB_OUTPUT

      # ── 4. 빌드 결과물 캐시 ─────────────────────────────────────
      - name: Cache dist packages
        id: cache_dist
        uses: actions/cache@v4
        with:
          path: ./dist
          key: dist-${{ matrix.arch }}-${{ matrix.dsm }}-${{ hashFiles('src/**') }}
          restore-keys: |
            dist-${{ matrix.arch }}-${{ matrix.dsm }}-

      # ── 5. 패키지 빌드 ──────────────────────────────────────────
      - name: Synology Package Builder Github Action
        if: steps.cache_dist.outputs.cache-hit != 'true'
        uses: tomgrv/synology-package-builder@v1.3.0
        with:
          dsm: ${{ matrix.dsm }}
          arch: ${{ matrix.arch }}
          output: ./dist

      # ── 6. INFO 패치 ────────────────────────────────────────────
      - name: Add dsmappname to INFO
        if: steps.cache_dist.outputs.cache-hit != 'true'
        run: |
          for f in ./dist/*.spk; do
            [[ "$f" == *_debug.spk ]] && continue
            tmpdir=$(mktemp -d)
            tar -xf "$f" -C "$tmpdir"
            APPID=$(jq -r '.[] | keys[]' src/ui/config)
            if ! grep -q "dsmappname" "$tmpdir/INFO"; then
              sed -i "s/dsmuidir=\"ui\"/dsmuidir=\"ui\"\ndsmappname=\"$APPID\"/" "$tmpdir/INFO"
            fi
            tar -cf "$f" -C "$tmpdir" $(ls "$tmpdir")
            rm -rf "$tmpdir"
          done

      # ── 7. debug spk 제거 및 파일명 정리 ────────────────────────
      - name: Remove debug spk and rename package
        if: steps.cache_dist.outputs.cache-hit != 'true'
        run: |
          ls -l ./dist
          rm ./dist/*_debug.spk
          for f in ./dist/*.spk; do
            mv "$f" "${f%.spk}-${{ matrix.dsm }}.spk"
          done
          ls -l ./dist

      # ── 8. noarch 패키지 생성 ────────────────────────────────────
      - name: Create noarch package
        if: steps.cache_dist.outputs.cache-hit != 'true'
        run: |
          for f in ./dist/Synosmartinfo-x86_64-*.spk; do
            noarch="${f/x86_64/noarch}"
            tmpdir=$(mktemp -d)
            tar -xf "$f" -C "$tmpdir"
            sed -i 's/arch="x86_64"/arch="noarch"/' "$tmpdir/INFO"
            tar -cf "$noarch" -C "$tmpdir" $(ls "$tmpdir")
            rm -rf "$tmpdir"
          done
          ls -l ./dist

      # ── 9. 아티팩트 업로드 ──────────────────────────────────────
      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          name: SynoSmartInfo-${{ matrix.dsm }}
          path: ./dist/*.spk

      # ── 10. 릴리즈 ──────────────────────────────────────────────
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_latest_tag.outputs.new_tag }}
          files: |
            ./dist/*.spk
