name: Build n Release Synology Smart Info Package (Cache-Controlled)
on:
  workflow_dispatch:
    inputs:
      use_cache:
        description: 'Use cache? (true/false)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  prepare:
    name: Prepare Release Tag
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.get_latest_tag.outputs.new_tag }}
    steps:
      - name: Get latest release tag from PeterSuh-Q3/SynoSmartInfo
        id: get_latest_tag
        run: |
          latest_tag=$(curl -s https://api.github.com/repos/PeterSuh-Q3/SynoSmartInfo/releases/latest | jq -r .tag_name)
          echo "Latest tag: $latest_tag"
          major=$(echo $latest_tag | cut -d. -f1 | tr -d 'v')
          minor=$(echo $latest_tag | cut -d. -f2)
          patch=$(echo $latest_tag | cut -d. -f3)
          if [ "$patch" -lt 9 ]; then
            patch=$((patch + 1))
          else
            patch=0
            minor=$((minor + 1))
          fi
          new_tag="v${major}.${minor}.${patch}"
          echo "new_tag=$new_tag" >> $GITHUB_OUTPUT

  build-spk:
    name: Build Package ${{ github.event.inputs.use_cache || 'default' }}
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        arch: ['kvmx64']
        dsm: ['7.2']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------------------------------------------------------
      # [FIX 1] 외부 스크립트를 캐시 키 계산 전에 먼저 다운로드하고
      #         upstream 커밋 SHA를 캐시 키에 포함시켜
      #         외부 소스 변경 시 캐시가 무효화되도록 수정
      # ---------------------------------------------------------------
      - name: Get latest syno_smart_info.sh and capture upstream commit hash
        id: get_script
        run: |
          COMMIT=$(curl -s https://api.github.com/repos/007revad/Synology_SMART_info/commits/main \
            | jq -r .sha | cut -c1-8)
          echo "Upstream commit: $COMMIT"
          echo "commit=$COMMIT" >> $GITHUB_OUTPUT
          curl -kL https://raw.githubusercontent.com/007revad/Synology_SMART_info/refs/heads/main/syno_smart_info.sh \
            -o ./src/bin/syno_smart_info.sh

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: docker-${{ runner.os }}-synology-package-builder-v1.3.0
          restore-keys: |
            docker-${{ runner.os }}-synology-package-builder-

      - name: Pull & cache builder image
        run: |
          docker pull ghcr.io/tomgrv/synology-package-builder:v1.3.0 || true

      # ---------------------------------------------------------------
      # [FIX 1 계속] 캐시 키에 upstream 커밋 해시(${{ steps.get_script.outputs.commit }})
      #              추가 → 외부 스크립트 변경 시 캐시 자동 무효화
      # ---------------------------------------------------------------
      - name: Cache dist packages
        id: cache_dist
        if: github.event.inputs.use_cache != 'false'
        uses: actions/cache@v4
        with:
          path: ./dist
          key: dist-${{ matrix.arch }}-${{ matrix.dsm }}-${{ hashFiles('src/**') }}-${{ steps.get_script.outputs.commit }}
          restore-keys: |
            dist-${{ matrix.arch }}-${{ matrix.dsm }}-

      - name: Synology Package Builder Github Action
        if: steps.cache_dist.outputs.cache-hit != 'true' || github.event.inputs.use_cache == 'false'
        uses: tomgrv/synology-package-builder@v1.3.0
        with:
          dsm: ${{ matrix.dsm }}
          arch: ${{ matrix.arch }}
          output: ./dist

      - name: Add dsmappname to INFO
        if: steps.cache_dist.outputs.cache-hit != 'true' || github.event.inputs.use_cache == 'false'
        run: |
          for f in ./dist/*.spk; do
            [[ "$f" == *_debug.spk ]] && continue
            tmpdir=$(mktemp -d)
            tar -xf "$f" -C "$tmpdir"
            APPID=$(jq -r '.[] | keys[]' src/ui/config)
            if ! grep -q "dsmappname" "$tmpdir/INFO"; then
              sed -i "s/dsmuidir=\"ui\"/dsmuidir=\"ui\"\ndsmappname=\"$APPID\"/" "$tmpdir/INFO"
            fi
            tar -cf "$f" -C "$tmpdir" $(ls "$tmpdir")
            rm -rf "$tmpdir"
          done

      - name: Remove debug spk and rename package
        if: steps.cache_dist.outputs.cache-hit != 'true' || github.event.inputs.use_cache == 'false'
        run: |
          ls -l ./dist
          rm ./dist/*_debug.spk 2>/dev/null || true
          ls -l ./dist

      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          name: SynoSmartInfo-${{ matrix.dsm }}-${{ github.event.inputs.use_cache || 'cached' }}
          path: ./dist/*.spk

      # ---------------------------------------------------------------
      # [FIX 2] workflow_dispatch 실행 시 github.ref_type은 항상 'branch'이므로
      #         'tag' 조건을 제거하고, use_cache == 'false'일 때만 릴리즈 제외
      #         (강제 재빌드=캐시 무시 시에는 테스트 목적으로 간주하여 릴리즈 스킵)
      # ---------------------------------------------------------------
      - name: Release
        if: github.event.inputs.use_cache != 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.new_tag }}
          files: |
            ./dist/*.spk
