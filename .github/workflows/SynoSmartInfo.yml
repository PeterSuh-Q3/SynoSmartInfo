name: Build n Release Synology Smart Info Package

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-spk:
    name: Build Package
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 1      
      matrix:
        arch: ['kvmx64']
        dsm: ['7.3','7.2','7.1','7.0']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get latest release tag from PeterSuh-Q3/SynoSmartInfo
        id: get_latest_tag
        run: |
          latest_tag=$(curl -s https://api.github.com/repos/PeterSuh-Q3/SynoSmartInfo/releases/latest | jq -r .tag_name)
          echo "Latest tag: $latest_tag"
          major=$(echo $latest_tag | cut -d. -f1 | tr -d 'v')
          minor=$(echo $latest_tag | cut -d. -f2)
          patch=$(echo $latest_tag | cut -d. -f3)
          if [ "$patch" -lt 9 ]; then
            patch=$((patch + 1))
          else
            patch=0
            minor=$((minor + 1))
          fi
          new_tag="v${major}.${minor}.${patch}"
          echo "new_tag=$new_tag" >> $GITHUB_OUTPUT

      - name: Get latest syno_smart_info.sh
        run: |
          curl -kL https://raw.githubusercontent.com/007revad/Synology_SMART_info/refs/heads/main/syno_smart_info.sh -o ./src/bin/syno_smart_info.sh

      #- name: Synology Package Builder (with retries)
      #  uses: nick-fields/retry@v3
      #  with:
      #    timeout_minutes: 120
      #    max_attempts: 3
      #    retry_wait_seconds: 60
      #    command: |
      #      docker run --rm \
      #        -v "${{ github.workspace }}:/workspace" \
      #        -w /workspace \
      #        -e DSM="${{ matrix.dsm }}" \
      #        -e ARCH="${{ matrix.arch }}" \
      #        ghcr.io/tomgrv/synology-package-builder:v1.3.0
        
      - name: Synology Package Builder Github Action
        uses: tomgrv/synology-package-builder@v1.3.0
        with:
          dsm: ${{ matrix.dsm }}
          arch: ${{ matrix.arch }}
          output: ./dist

      - name: Add dsmappname to INFO
        run: |
          for f in ./dist/*.spk; do
            [[ "$f" == *_debug.spk ]] && continue
            tmpdir=$(mktemp -d)
            tar -xf "$f" -C "$tmpdir"
            APPID=$(jq -r '.[] | keys[]' src/ui/config)
            if ! grep -q "dsmappname" "$tmpdir/INFO"; then
              sed -i "s/dsmuidir=\"ui\"/dsmuidir=\"ui\"\ndsmappname=\"$APPID\"/" "$tmpdir/INFO"
            fi
            tar -cf "$f" -C "$tmpdir" $(ls "$tmpdir")
            rm -rf "$tmpdir"
          done

      - name: Remove debug spk and rename package
        run: |
          ls -l ./dist
          rm ./dist/*_debug.spk
          for f in ./dist/*.spk; do
            mv "$f" "${f%.spk}-${{ matrix.dsm }}.spk"
          done
          ls -l ./dist

      - name: Create noarch package
        run: |
          for f in ./dist/Synosmartinfo-x86_64-*.spk; do
            noarch="${f/x86_64/noarch}"
            tmpdir=$(mktemp -d)
            tar -xf "$f" -C "$tmpdir"
            sed -i 's/arch="x86_64"/arch="noarch"/' "$tmpdir/INFO"
            tar -cf "$noarch" -C "$tmpdir" $(ls "$tmpdir")
            rm -rf "$tmpdir"
          done
          ls -l ./dist
          
      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          name: SynoSmartInfo-${{ matrix.dsm }}
          path: ./dist/*.spk

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_latest_tag.outputs.new_tag }}
          files: |
            ./dist/*.spk
